<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EVITAR EL MATE CON JUGADA PREVIA</title>
    <style>
        /* RESET Y VARIABLES */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        :root {
            --primary-color: #3498db;
            --primary-dark: #2980b9;
            --success-color: #2ecc71;
            --success-dark: #27ae60;
            --danger-color: #e74c3c;
            --danger-dark: #c0392b;
            --warning-color: #f39c12;
            --dark-bg: #2c3e50;
            --light-bg: #f8f9fa;
            --border-radius: 10px;
            --box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            --selected-square: rgba(52, 152, 219, 0.5);
            --valid-move: rgba(46, 204, 113, 0.3);
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--dark-bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: var(--border-radius);
            padding: 15px;
            box-shadow: var(--box-shadow);
        }
        
        /* TIPOGRAFÍA RESPONSIVE */
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: clamp(1.2rem, 5vw, 2rem);
            line-height: 1.3;
            word-break: break-word;
        }
        
        /* PANEL DE LOGIN RESPONSIVE */
        .login-section {
            background: var(--light-bg);
            padding: clamp(15px, 4vw, 25px);
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
        
        .login-title {
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            color: var(--dark-bg);
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .login-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .login-row input {
            flex: 1 1 200px;
            padding: 12px 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            min-width: 150px;
            width: 100%;
        }
        
        .login-row button {
            padding: 12px 15px;
            border: none;
            border-radius: 5px;
            background: var(--primary-color);
            color: white;
            cursor: pointer;
            font-size: clamp(14px, 3vw, 16px);
            font-weight: 600;
            flex: 1 1 auto;
            min-width: 120px;
        }
        
        .login-row button:hover {
            background: var(--primary-dark);
        }
        
        .admin-login-btn {
            background: #e67e22 !important;
        }
        
        .admin-login-btn:hover {
            background: #d35400 !important;
        }
        
        /* SELECTOR DE PROBLEMA RESPONSIVE */
        .problem-selector {
            background: #e8f4f8;
            padding: clamp(15px, 3vw, 20px);
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .problem-selector h3 {
            color: var(--dark-bg);
            margin-bottom: 15px;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
        }
        
        .selector-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .selector-controls input {
            padding: 10px;
            border: 2px solid var(--primary-color);
            border-radius: 5px;
            width: 80px;
            font-size: 16px;
            text-align: center;
        }
        
        .selector-controls span {
            font-size: clamp(14px, 3vw, 16px);
            color: var(--dark-bg);
        }
        
        .selector-controls strong {
            color: var(--primary-color);
            font-size: clamp(1rem, 3.5vw, 1.2rem);
        }
        
        .selector-controls button {
            padding: 12px 20px;
            background: var(--success-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: clamp(14px, 3vw, 16px);
            font-weight: 600;
            flex: 1 1 auto;
        }
        
        .selector-controls button:hover {
            background: var(--success-dark);
        }
        
        .selector-info {
            margin-top: 10px;
            color: var(--dark-bg);
            font-size: clamp(13px, 2.5vw, 15px);
        }
        
        /* PANEL ADMIN RESPONSIVE */
        .admin-section {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            padding: clamp(15px, 3vw, 20px);
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .admin-section h3 {
            color: #856404;
            margin-bottom: 15px;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
        }
        
        .admin-section textarea {
            width: 100%;
            height: clamp(150px, 40vh, 200px);
            margin: 10px 0;
            padding: 10px;
            font-family: monospace;
            font-size: clamp(11px, 2.5vw, 12px);
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .admin-section input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .admin-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .admin-buttons button {
            flex: 1 1 auto;
            min-width: 120px;
        }
        
        /* ÁREA DE JUEGO RESPONSIVE */
        .game-area {
            display: none;
        }
        
        .board-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        #chessboard {
            width: min(500px, 90vw);
            height: min(500px, 90vw);
            border: 2px solid #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
        }
        
        /* Estilos para resaltar casillas seleccionadas */
        .square-selected {
            background-color: var(--selected-square) !important;
        }
        
        .square-valid {
            background-color: var(--valid-move) !important;
            cursor: pointer;
        }
        
        .square-valid:hover {
            background-color: rgba(46, 204, 113, 0.5) !important;
        }
        
        .timer-container {
            width: 100%;
            max-width: min(500px, 90vw);
            text-align: center;
        }
        
        .timer-label {
            font-size: clamp(1rem, 4vw, 1.2rem);
            margin-bottom: 5px;
            color: #666;
        }
        
        .timer {
            font-size: clamp(2rem, 10vw, 2.5rem);
            padding: 10px 15px;
            background: #34495e;
            color: white;
            border-radius: 8px;
            font-family: monospace;
            margin-bottom: 10px;
        }
        
        .progress-mini {
            font-size: clamp(1rem, 4vw, 1.2rem);
            color: var(--dark-bg);
            margin: 10px 0;
            font-weight: bold;
        }
        
        .user-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
            width: 100%;
        }
        
        .button {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            background: var(--primary-color);
            color: white;
            cursor: pointer;
            font-size: clamp(14px, 3.5vw, 16px);
            font-weight: 600;
            flex: 1 1 auto;
            min-width: 120px;
        }
        
        .button.end {
            background: var(--danger-color);
        }
        
        .button.end:hover {
            background: var(--danger-dark);
        }
        
        /* MODAL RESPONSIVE */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 10px;
        }
        
        .modal-content {
            background: white;
            padding: clamp(20px, 5vw, 30px);
            border-radius: 10px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal h2 {
            color: var(--dark-bg);
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
            font-size: clamp(1.2rem, 5vw, 1.5rem);
        }
        
        .tip-box {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 5px;
            padding: 12px;
            margin: 15px 0;
            color: #856404;
            font-size: clamp(14px, 3vw, 15px);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }
        
        .stats-table {
            background: var(--light-bg);
            border-radius: 8px;
            padding: 15px;
        }
        
        .stats-table h4 {
            color: var(--dark-bg);
            margin-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
            font-size: clamp(1rem, 3.5vw, 1.1rem);
        }
        
        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
            font-size: clamp(14px, 3vw, 15px);
        }
        
        .percentage { color: var(--success-color); font-weight: bold; }
        .percentage.medium { color: var(--warning-color); }
        .percentage.low { color: var(--danger-color); }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .modal-buttons button {
            min-width: 120px;
        }
        
        .message-banner {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--warning-color);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: clamp(14px, 4vw, 16px);
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 2000;
            display: none;
            animation: slideDown 0.3s ease;
            white-space: nowrap;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        @keyframes slideDown {
            from { top: -100px; }
            to { top: 20px; }
        }
        
        /* MEJORAS TÁCTILES PARA MÓVIL */
        @media (max-width: 768px) {
            body {
                padding: 5px;
            }
            
            .container {
                padding: 10px;
            }
            
            .login-row {
                flex-direction: column;
            }
            
            .login-row input,
            .login-row button {
                width: 100%;
            }
            
            .selector-controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .selector-controls input {
                width: 100%;
            }
            
            .admin-buttons {
                flex-direction: column;
            }
            
            .user-controls {
                flex-direction: column;
            }
            
            .modal-buttons {
                flex-direction: column;
            }
            
            .modal-content {
                padding: 15px;
            }
            
            /* Aumentar área táctil para botones en móvil */
            .button,
            .login-row button,
            .selector-controls button {
                min-height: 48px;
                padding: 14px 20px;
            }
            
            /* Mejorar scroll en móvil */
            .stats-table {
                max-height: 300px;
                overflow-y: auto;
            }
        }
        
        /* Ajustes para pantallas muy pequeñas */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.1rem;
            }
            
            .login-title {
                font-size: 1rem;
            }
            
            .timer {
                font-size: 2rem;
            }
            
            .modal h2 {
                font-size: 1.2rem;
            }
        }
        
        /* Orientación landscape en móvil */
        @media (max-width: 900px) and (orientation: landscape) {
            .board-container {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            #chessboard {
                width: min(400px, 50vh);
                height: min(400px, 50vh);
            }
            
            .timer-container {
                max-width: 300px;
            }
        }
    </style>
</head>

            <div class="board-container">
                <div id="chessboard"></div>
                
                <div class="timer-container">
                    <div class="timer-label">Tiempo restante</div>
                    <div class="timer" id="timerDisplay">01:00</div>
                </div>
                
                <div class="progress-mini" id="progressMini">
                    Problema <span id="currentProblem">0</span>/<span id="totalProblems">0</span> · 
                    Intentos: <span id="attemptsLeft">3</span>
                </div>
                
                <div class="user-controls">
                    <button class="button end" onclick="endSession()">🏁 Finalizar Sesión</button>
                </div>
            </div>
        </div>
        
        <!-- Modal de Estadísticas Finales -->
        <div class="modal" id="finalStatsModal">
            <div class="modal-content">
                <h2>📊 Estadísticas de la Sesión</h2>
                <div id="finalStatsContent"></div>
                <div class="modal-buttons">
                    <button class="button" onclick="closeModal()">Cerrar</button>
                    <button class="button end" onclick="startNewSession()">Nueva Sesión</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" />

    <script>
        // =================================================================
        // CONFIGURACIÓN INICIAL (MODIFICABLE POR EL ADMIN)
        // =================================================================
        
        // Contraseñas de acceso (modifica los valores entre comillas)
        let STUDENT_PASSWORD = "ajedrez2024";    // Contraseña para estudiantes
        let ADMIN_PASSWORD = "admin123";         // Contraseña para administradores
        
        // Tiempo de espera antes del primer movimiento automático
        // Valor en milisegundos (2000 = 2 segundos)
        let FIRST_MOVE_DELAY = 2000;
        
        // =================================================================
        // VARIABLES GLOBALES (NO MODIFICAR)
        // =================================================================
        let board = null;
        let game = null;
        let problemData = [];
        let currentIndex = 0;
        let userColor = 'w';
        let attempts = 0;
        const MAX_ATTEMPTS = 3;
        let firstMoveMade = false;
        let problemCompleted = false;
        let timerInterval = null;
        let timeLeft = 60;
        let isLoggedIn = false;
        let sessionId = 1;
        let currentSessionResults = [];
        let waitingForUndo = false;
        
        // Variables para el modo táctil (selección)
        let selectedSquare = null;
        let validMoves = [];
        
        // Estadísticas acumuladas
        let sessions = JSON.parse(localStorage.getItem('chessSessions')) || [];
        let cumulativeStats = { first: 0, second: 0, third: 0, failed: 0, total: 0 };

        // Inicialización
        document.addEventListener('DOMContentLoaded', function() {
            game = new Chess();
            loadCumulativeStats();
            loadProblems();
        });

        function showBanner(message, isError = false) {
            let banner = document.getElementById('messageBanner');
            banner.textContent = message;
            banner.style.background = isError ? '#e74c3c' : '#f39c12';
            banner.style.display = 'block';
            
            setTimeout(() => {
                banner.style.display = 'none';
            }, 2000);
        }

        function loadCumulativeStats() {
            sessions.forEach(session => {
                session.results.forEach(result => {
                    if (result.attempts === 1) cumulativeStats.first++;
                    else if (result.attempts === 2) cumulativeStats.second++;
                    else if (result.attempts === 3) cumulativeStats.third++;
                    else cumulativeStats.failed++;
                    cumulativeStats.total++;
                });
            });
        }

        function login() {
            const password = document.getElementById('passwordInput').value;
            
            if (password === STUDENT_PASSWORD) {
                isLoggedIn = true;
                document.getElementById('problemSelector').style.display = 'block';
                document.getElementById('totalProblemsDisplay').textContent = problemData.length;
                checkLastProblem();
            } else {
                alert('Contraseña incorrecta');
            }
        }

        function checkLastProblem() {
            if (sessions.length > 0) {
                let lastSession = sessions[sessions.length - 1];
                if (lastSession.results.length > 0) {
                    let lastProblem = Math.max(...lastSession.results.map(r => r.problem));
                    if (lastProblem < problemData.length) {
                        document.getElementById('lastProblemInfo').innerHTML = 
                            `💡 Último problema resuelto: <strong>${lastProblem}</strong>. 
                             ¿Quieres continuar desde el <a href="#" onclick="setStartProblem(${lastProblem + 1})">problema ${lastProblem + 1}</a>?`;
                    }
                }
            }
        }

        function setStartProblem(problemNum) {
            document.getElementById('startProblemInput').value = problemNum;
        }

        function startSession() {
            if (!isLoggedIn) {
                alert('Primero debes iniciar sesión');
                return;
            }
            
            let startProblem = parseInt(document.getElementById('startProblemInput').value);
            
            if (isNaN(startProblem) || startProblem < 1) {
                alert('Por favor, ingresa un número de problema válido');
                return;
            }
            
            if (startProblem > problemData.length) {
                alert(`Solo hay ${problemData.length} problemas disponibles. Comenzando desde el problema 1.`);
                startProblem = 1;
            }
            
            // Ocultar login y mostrar juego
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            
            sessionId = sessions.length + 1;
            currentSessionResults = [];
            
            // Inicializar tablero si no existe
            if (!board) {
                initBoard(() => {
                    loadProblem(startProblem - 1);
                });
            } else {
                loadProblem(startProblem - 1);
            }
        }

        function initBoard(callback) {
            board = Chessboard('chessboard', {
                draggable: true,
                position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onMouseoutSquare: onMouseoutSquare,
                onMouseoverSquare: onMouseoverSquare,
                onSnapEnd: onSnapEnd
            });
            
            // Añadir manejador de clics para selección táctil
            setTimeout(() => {
                addClickHandlers();
            }, 500);
            
            if (callback) setTimeout(callback, 500);
        }

        function addClickHandlers() {
            const squares = document.querySelectorAll('.square-55d63');
            squares.forEach(square => {
                square.addEventListener('click', handleSquareClick);
                square.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleSquareClick(e);
                });
            });
        }

        function handleSquareClick(event) {
            event.preventDefault();
            
            if (problemCompleted || !firstMoveMade || attempts >= MAX_ATTEMPTS || waitingForUndo) {
                clearSelection();
                return;
            }
            
            // Obtener la casilla clickeada
            const square = event.currentTarget;
            const squareId = square.getAttribute('data-square') || square.id;
            
            if (!squareId) return;
            
            // Si no hay casilla seleccionada y hay una pieza del usuario en esa casilla
            if (!selectedSquare) {
                const piece = game.get(squareId);
                if (piece && piece.color === userColor) {
                    // Seleccionar la casilla
                    selectSquare(squareId);
                }
            } else {
                // Ya hay una casilla seleccionada - intentar mover
                if (selectedSquare === squareId) {
                    // Click en la misma casilla - deseleccionar
                    clearSelection();
                } else {
                    // Intentar mover de la casilla seleccionada a esta
                    makeMove(selectedSquare, squareId);
                }
            }
        }

        function selectSquare(square) {
            clearSelection();
            selectedSquare = square;
            
            // Resaltar la casilla seleccionada
            const squareElement = document.querySelector(`[data-square="${square}"], #${square}`);
            if (squareElement) {
                squareElement.classList.add('square-selected');
            }
            
            // Calcular y resaltar movimientos válidos
            validMoves = game.moves({ 
                square: square, 
                verbose: true 
            });
            
            validMoves.forEach(move => {
                const targetElement = document.querySelector(`[data-square="${move.to}"], #${move.to}`);
                if (targetElement) {
                    targetElement.classList.add('square-valid');
                }
            });
        }

        function clearSelection() {
            if (selectedSquare) {
                const oldSquare = document.querySelector(`[data-square="${selectedSquare}"], #${selectedSquare}`);
                if (oldSquare) {
                    oldSquare.classList.remove('square-selected');
                }
            }
            
            validMoves.forEach(move => {
                const targetElement = document.querySelector(`[data-square="${move.to}"], #${move.to}`);
                if (targetElement) {
                    targetElement.classList.remove('square-valid');
                }
            });
            
            selectedSquare = null;
            validMoves = [];
        }

        function makeMove(from, to) {
            clearSelection();
            
            // Verificar si el movimiento es legal
            const moves = game.moves({ 
                verbose: true,
                square: from
            });
            
            const legalMove = moves.find(m => m.to === to);
            
            if (!legalMove) {
                showBanner('❌ Movimiento no válido', true);
                return;
            }
            
            // Hacer el movimiento
            let move = game.move({
                from: from,
                to: to,
                promotion: 'q'
            });
            
            if (!move) {
                showBanner('❌ Error al mover', true);
                return;
            }
            
            // Actualizar tablero
            board.position(game.fen());
            
            // Procesar el resultado
            processMoveResult(move);
        }

        function onDragStart(source, piece, pos, orient) {
            if (problemCompleted || !firstMoveMade || attempts >= MAX_ATTEMPTS || waitingForUndo) {
                return false;
            }
            if (game.turn() !== userColor) {
                return false;
            }
            // Limpiar selección al empezar a arrastrar
            clearSelection();
            return true;
        }

        function onDrop(source, target) {
            if (problemCompleted || !firstMoveMade || attempts >= MAX_ATTEMPTS || waitingForUndo) {
                return 'snapback';
            }
            if (game.turn() !== userColor) {
                return 'snapback';
            }
            
            // Hacer el movimiento
            let move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });
            
            if (!move) return 'snapback';
            
            // Mostrar el movimiento en el tablero
            board.position(game.fen());
            
            // Procesar el resultado
            processMoveResult(move);
        }

        function onMouseoverSquare(square, piece) {
            // Opcional: resaltar movimientos al pasar el ratón
        }

        function onMouseoutSquare(square, piece) {
            // Opcional: quitar resaltado al salir
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function processMoveResult(move) {
            let data = problemData[currentIndex];
            let userMove = normalizeMove(move.san);
            let correctMove = data.second_normalized || '';
            
            if (userMove === correctMove) {
                // ACIERTO - Guardar resultado
                attempts++;
                
                currentSessionResults.push({
                    problem: currentIndex + 1,
                    attempts: attempts,
                    success: true
                });
                
                if (attempts === 1) cumulativeStats.first++;
                else if (attempts === 2) cumulativeStats.second++;
                else cumulativeStats.third++;
                cumulativeStats.total++;
                
                problemCompleted = true;
                stopTimer();
                
                showBanner('✅ ¡Correcto!');
                clearSelection();
                
                setTimeout(() => {
                    if (currentIndex + 1 < problemData.length) {
                        loadProblem(currentIndex + 1);
                    } else {
                        showFinalStats();
                    }
                }, 1500);
                
            } else {
                // MOVIMIENTO INCORRECTO
                attempts++;
                
                if (attempts >= MAX_ATTEMPTS) {
                    // FALLO - 3 intentos - Guardar resultado
                    currentSessionResults.push({
                        problem: currentIndex + 1,
                        attempts: attempts,
                        success: false
                    });
                    
                    cumulativeStats.failed++;
                    cumulativeStats.total++;
                    
                    problemCompleted = true;
                    stopTimer();
                    
                    showBanner(`❌ Has fallado los 3 intentos. La jugada correcta era: ${data.second}`, true);
                    
                    // Mostrar jugada correcta
                    waitingForUndo = true;
                    clearSelection();
                    
                    while (game.history().length > 1) game.undo();
                    try {
                        game.move(data.second);
                        board.position(game.fen());
                    } catch(e) {}
                    
                    setTimeout(() => {
                        waitingForUndo = false;
                        if (currentIndex + 1 < problemData.length) {
                            loadProblem(currentIndex + 1);
                        } else {
                            showFinalStats();
                        }
                    }, 2000);
                    
                } else {
                    // AÚN QUEDAN INTENTOS - Revertir el movimiento
                    showBanner(`❌ Movimiento incorrecto. Te quedan ${MAX_ATTEMPTS - attempts} intentos.`, true);
                    
                    // Revertir el movimiento
                    waitingForUndo = true;
                    clearSelection();
                    game.undo();
                    
                    // Forzar actualización del tablero
                    setTimeout(() => {
                        board.position(game.fen());
                        setTimeout(() => {
                            board.position(game.fen());
                            waitingForUndo = false;
                        }, 50);
                    }, 10);
                }
            }
            
            updateUI();
        }

        function normalizeMove(move) {
            if (!move) return '';
            return move.replace(/[+#]/g, '').trim();
        }

        function loadProblems() {
            const text = document.getElementById('pgnInput').value;
            const games = text.split('[Event').filter(g => g.trim());
            problemData = [];
            
            for (let i = 0; i < games.length; i++) {
                let gameText = '[Event' + games[i];
                let fenMatch = gameText.match(/\[FEN "([^"]+)"\]/);
                if (!fenMatch) continue;
                let fen = fenMatch[1];
                
                let lines = gameText.split('\n');
                let moveLine = '';
                
                for (let j = lines.length - 1; j >= 0; j--) {
                    let line = lines[j].trim();
                    if (line && !line.startsWith('[') && line.includes(' ')) {
                        moveLine = line;
                        break;
                    }
                }
                
                if (!moveLine) continue;
                
                let parts = moveLine.split(/\s+/);
                let first = parts[0] || null;
                let second = parts[1] || null;
                
                problemData.push({
                    fen: fen,
                    first: first,
                    second: second,
                    second_normalized: normalizeMove(second)
                });
            }
            
            document.getElementById('totalProblems').textContent = problemData.length;
            document.getElementById('totalProblemsDisplay').textContent = problemData.length;
        }

        function loadProblem(index) {
            stopTimer();
            clearSelection();
            
            if (index >= problemData.length) {
                showFinalStats();
                return;
            }
            
            let data = problemData[index];
            if (!data || !data.fen) return;
            
            try {
                game.load(data.fen);
            } catch(e) {
                return;
            }
            
            userColor = game.turn() === 'w' ? 'b' : 'w';
            board.orientation(userColor === 'w' ? 'white' : 'black');
            board.position(game.fen());
            
            currentIndex = index;
            attempts = 0;
            firstMoveMade = false;
            problemCompleted = false;
            waitingForUndo = false;
            
            updateUI();
            
            // Reasignar manejadores de clics después de cargar nueva posición
            setTimeout(() => {
                addClickHandlers();
            }, 200);
            
            setTimeout(() => {
                if (data.first && !problemCompleted) {
                    try {
                        let moveResult = game.move(data.first);
                        if (moveResult) {
                            firstMoveMade = true;
                            board.position(game.fen());
                            startTimer();
                        }
                    } catch(e) {}
                }
            }, FIRST_MOVE_DELAY);
        }

        function updateUI() {
            document.getElementById('attemptsLeft').textContent = MAX_ATTEMPTS - attempts;
            document.getElementById('currentProblem').textContent = currentIndex + 1;
            document.getElementById('totalProblems').textContent = problemData.length;
        }

        function startTimer() {
            stopTimer();
            timeLeft = parseInt(document.getElementById('timeInput').value);
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                if (!problemCompleted && firstMoveMade && !waitingForUndo) {
                    timeLeft--;
                    updateTimerDisplay();
                    
                    if (timeLeft <= 0) {
                        stopTimer();
                        
                        if (attempts < MAX_ATTEMPTS && !problemCompleted) {
                            // Tiempo agotado = fallo automático
                            attempts = MAX_ATTEMPTS;
                            
                            currentSessionResults.push({
                                problem: currentIndex + 1,
                                attempts: MAX_ATTEMPTS,
                                success: false
                            });
                            
                            cumulativeStats.failed++;
                            cumulativeStats.total++;
                            problemCompleted = true;
                            
                            updateUI();
                            
                            showBanner('⏰ ¡Tiempo agotado!', true);
                            
                            let correct = problemData[currentIndex].second;
                            
                            waitingForUndo = true;
                            clearSelection();
                            while (game.history().length > 1) game.undo();
                            try {
                                game.move(correct);
                                board.position(game.fen());
                            } catch(e) {}
                            
                            setTimeout(() => {
                                waitingForUndo = false;
                                if (currentIndex + 1 < problemData.length) {
                                    loadProblem(currentIndex + 1);
                                } else {
                                    showFinalStats();
                                }
                            }, 2000);
                        }
                    }
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateTimerDisplay() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timerDisplay').textContent = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function showFinalStats() {
            stopTimer();
            clearSelection();
            
            // Guardar sesión
            let session = {
                id: sessionId,
                date: new Date().toLocaleString(),
                results: currentSessionResults,
                problemCount: problemData.length
            };
            
            sessions.push(session);
            localStorage.setItem('chessSessions', JSON.stringify(sessions));
            
            // Calcular estadísticas por problema y promedio
            let totalPercentage = 0;
            let problemsWithResults = 0;
            
            let html = `
                <div style="margin-bottom: 20px;">
                    <h3 style="color: #3498db;">Sesión #${sessionId}</h3>
                    <p><strong>Fecha:</strong> ${session.date}</p>
                </div>
            `;
            
            // Si hay sesiones previas, mostrar sugerencia
            if (sessions.length > 0) {
                let lastSession = sessions[sessions.length - 1];
                if (lastSession.results.length > 0) {
                    let lastProblem = Math.max(...lastSession.results.map(r => r.problem));
                    if (lastProblem < problemData.length) {
                        html += `
                            <div class="tip-box">
                                <strong>💡 Sugerencia:</strong> Para tu próxima sesión, puedes comenzar desde el problema 
                                <strong>${lastProblem + 1}</strong> (último problema resuelto: ${lastProblem}).
                            </div>
                        `;
                    }
                }
            }
            
            html += `<div style="margin-bottom: 20px;">
                <h4>Resultados por Problema:</h4>
                <div style="max-height: 200px; overflow-y: auto; border: 1px solid #ddd; border-radius: 5px; padding: 10px;">
            `;
            
            for (let i = 0; i < problemData.length; i++) {
                let result = currentSessionResults.find(r => r.problem === i + 1);
                let pct = 0;
                let color = '#666';
                let pctText = 'no iniciado';
                
                if (result) {
                    problemsWithResults++;
                    if (result.success) {
                        if (result.attempts === 1) { 
                            pct = 100; 
                            pctText = '100%';
                            color = '#27ae60'; 
                        }
                        else if (result.attempts === 2) { 
                            pct = 66; 
                            pctText = '66%';
                            color = '#f39c12'; 
                        }
                        else { 
                            pct = 33; 
                            pctText = '33%';
                            color = '#f39c12'; 
                        }
                    } else { 
                        pct = 0; 
                        pctText = '0%';
                        color = '#e74c3c'; 
                    }
                    totalPercentage += pct;
                } else { 
                    pctText = 'no iniciado';
                    color = '#95a5a6'; 
                }
                
                html += `<div style="display: flex; justify-content: space-between; padding: 5px 0;">
                    <span>Problema ${i + 1}:</span>
                    <span style="color: ${color}; font-weight: bold;">${pctText}</span>
                </div>`;
            }
            
            html += `</div></div>`;
            
            // Calcular promedio
            let averagePct = problemsWithResults > 0 ? (totalPercentage / problemsWithResults).toFixed(1) : 0;
            
            // Resumen de la sesión
            let successFirst = currentSessionResults.filter(r => r.success && r.attempts === 1).length;
            let successSecond = currentSessionResults.filter(r => r.success && r.attempts === 2).length;
            let successThird = currentSessionResults.filter(r => r.success && r.attempts === 3).length;
            let failed = currentSessionResults.filter(r => !r.success).length;
            let total = currentSessionResults.length;
            
            html += `
                <div style="background: #f0f0f0; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                    <h4>Resumen de la Sesión:</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>Problemas iniciados:</div><div>${total}</div>
                        <div>✅ 1er intento:</div><div style="color: #27ae60;">${successFirst}</div>
                        <div>👍 2do intento:</div><div style="color: #f39c12;">${successSecond}</div>
                        <div>👌 3er intento:</div><div style="color: #f39c12;">${successThird}</div>
                        <div>❌ Fallados:</div><div style="color: #e74c3c;">${failed}</div>
                        <div style="grid-column: span 2; border-top: 2px solid #3498db; margin-top: 5px; padding-top: 10px;">
                            <strong>Porcentaje promedio de éxito: ${averagePct}%</strong>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('finalStatsContent').innerHTML = html;
            document.getElementById('finalStatsModal').style.display = 'flex';
        }

        function endSession() {
            if (confirm('¿Finalizar la sesión?')) showFinalStats();
        }

        function closeModal() {
            document.getElementById('finalStatsModal').style.display = 'none';
        }

        function startNewSession() {
            location.reload();
        }

        function showAdminLogin() {
            let pwd = prompt('Contraseña de administrador:');
            if (pwd === ADMIN_PASSWORD) {
                document.getElementById('adminSection').style.display = 'block';
            }
        }

        function closeAdminPanel() {
            document.getElementById('adminSection').style.display = 'none';
        }

        function saveAdminConfig() {
            STUDENT_PASSWORD = document.getElementById('passwordInput').value;
            FIRST_MOVE_DELAY = parseInt(document.getElementById('delayInput').value) * 1000;
            loadProblems();
            alert('Configuración guardada');
            closeAdminPanel();
        }
    </script>
</body>
</html>
